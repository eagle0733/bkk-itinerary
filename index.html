<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>曼谷行程（內嵌導航 v2.2｜含管理面板）</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

  <style>
    :root{
      --bg:#0f172a; --card:#111827; --muted:#94a3b8; --text:#e5e7eb;
      --accent:#22c55e; --chip:#1f2937; --btn:#16a34a;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans TC",sans-serif}
    .container{max-width:960px;margin:0 auto;padding:16px 16px 88px}
    header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(15,23,42,.75));
      backdrop-filter: blur(8px);border-bottom:1px solid rgba(148,163,184,.15)}
    .head-inner{display:flex;gap:12px;align-items:center;padding:12px 16px}
    .title{font-size:18px;font-weight:700}
    .sub{font-size:12px;color:var(--muted)}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 16px}
    .tab{padding:10px;border-radius:12px;background:var(--chip);color:var(--text);
      text-align:center;font-weight:700;border:1px solid rgba(255,255,255,.08);cursor:pointer}
    .tab[aria-selected="true"]{background:var(--btn);border-color:transparent}
    .controls{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px 12px}
    .select,.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:600}
    .select{background:var(--chip);color:var(--text)}
    .btn{background:var(--btn);color:white;cursor:pointer}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:var(--text)}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin:10px 0}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .time{font-weight:800;letter-spacing:.2px;min-width:86px}
    .place{font-weight:700}
    .note{color:var(--muted);font-size:12px;margin-top:4px}
    .actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .action{flex:1;background:#0b5b2f;color:white;border-radius:12px;border:1px solid rgba(255,255,255,.12);
      padding:10px 12px;text-align:center;font-weight:700;cursor:pointer}
    .action.secondary{background:#0f766e}
    .route-card{background:#0b1220;border-radius:16px;border:1px dashed rgba(148,163,184,.25);padding:12px;margin-top:14px}
    .mapbox{margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
    iframe{width:100%;height:280px;border:0}
    footer.nav{position:fixed;bottom:8px;left:0;right:0;display:flex;gap:8px;justify-content:center}
    .nav-inner{max-width:960px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px}
    .nav-btn{background:var(--chip);color:var(--text);border:1px solid rgba(255,255,255,.08);padding:10px 12px;border-radius:14px;
      text-align:center;font-weight:800;cursor:pointer}
    .nav-btn[aria-current="page"]{background:var(--btn);color:white}
    .pill{display:inline-flex;align-items:center;gap:6px;background:#0b1220;border:1px solid rgba(255,255,255,.1);
      padding:6px 10px;border-radius:999px;font-size:12px;color:var(--muted)}
    .grid{display:grid;gap:10px}
    @media (min-width:720px){ .grid{grid-template-columns:1fr 1fr} iframe{height:360px} }

    /* overlays */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:100}
    .sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;background:#0b1220;border-top-left-radius:16px;border-top-right-radius:16px;
      width:min(960px,100%);max-height:78vh;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.12)}
    .sheet-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
    .sheet-title{font-weight:800}
    #map{height:56vh}
    .sheet-actions{display:flex;gap:8px;padding:10px;border-top:1px solid rgba(255,255,255,.12)}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:70px;background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.12);
      padding:10px 14px;border-radius:12px;font-size:12px;display:none;z-index:120}
  </style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div>
        <div class="title">曼谷行程（內嵌導航 v2.2）</div>
        <div class="sub">步行/開車：頁面內即時路線與持續定位；大眾運輸：開啟 Google 地圖</div>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="Days">
      <button class="tab" role="tab" id="tab-1" aria-controls="panel-1" aria-selected="true">Day 1</button>
      <button class="tab" role="tab" id="tab-2" aria-controls="panel-2" aria-selected="false">Day 2</button>
      <button class="tab" role="tab" id="tab-3" aria-controls="panel-3" aria-selected="false">Day 3</button>
      <button class="tab" role="tab" id="tab-4" aria-controls="panel-4" aria-selected="false">Day 4</button>
    </div>
    <div class="controls">
      <select id="travelMode" class="select" aria-label="導航模式">
        <option value="transit">大眾運輸（外開）</option>
        <option value="walking">步行（內嵌）</option>
        <option value="driving">自駕 / 計程車（內嵌）</option>
      </select>
      <button class="btn" id="btnLocate">📍 顯示目前位置</button>
      <button class="btn" id="btnTodayRoute">🗺️ 從我這裡串起今日路線</button>
      <button class="btn ghost" id="btnManage">🧩 管理行程</button>
    </div>
  </header>

  <main class="container">
    <div id="panels"></div>
    <div class="mapbox" id="liveMap" hidden>
      <iframe id="mapFrame" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </main>

  <footer class="nav">
    <div class="nav-inner">
      <button class="nav-btn" data-go="1" aria-current="page">Day 1</button>
      <button class="nav-btn" data-go="2">Day 2</button>
      <button class="nav-btn" data-go="3">Day 3</button>
      <button class="nav-btn" data-go="4">Day 4</button>
    </div>
  </footer>

  <!-- 內嵌導航面板 -->
  <div class="overlay" id="overlay">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-head">
        <div class="sheet-title">內嵌導航</div>
        <div>
          <button class="btn ghost" id="btnOpenExternal">在 Google 地圖開啟</button>
          <button class="btn" id="btnClose">關閉</button>
        </div>
      </div>
      <div id="map"></div>
      <div class="sheet-actions" style="justify-content:space-between;">
        <div id="navStatus" style="font-size:12px;color:#94a3b8">準備中…</div>
        <div>
          <button class="btn ghost" id="btnFollow">🔔 開始即時導航</button>
          <button class="btn ghost" id="btnWake" title="保持螢幕常亮">💡 常亮</button>
          <button class="btn ghost" id="btnVoice" title="語音提示">🔈 語音</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 行程管理面板（新增/刪除/匯出/匯入） -->
  <div class="overlay" id="mgrOverlay">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-head">
        <div class="sheet-title">管理行程</div>
        <div>
          <button class="btn ghost" id="btnAddStop">＋ 新增站點</button>
          <button class="btn ghost" id="btnExport">匯出JSON</button>
          <button class="btn ghost" id="btnImport">匯入JSON</button>
          <button class="btn" id="btnCloseMgr">關閉</button>
        </div>
      </div>
      <div id="mgrBody" style="padding:10px;overflow:auto;max-height:60vh"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
  /* ========= v2.2（單檔） + 管理面板 ========= */

  // ----- Data -----
  const DEFAULT_DAYS = [
    {"id":1,"label":"Day 1｜9/26 (五) ","chips":["抵達日","Siam 區","放鬆按摩"],
     "stops":[
       {"time":"07:55–10:40","title":"台北 → 曼谷","q":"Bangkok Suvarnabhumi Airport (BKK)","note":"航班抵達"},
       {"time":"12:00–13:00","title":"Samala Hotel","q":"Samala Hotel Bangkok","note":"Check-in/寄放行李"},
       {"time":"13:00–13:30","title":"暹羅百麗宮 Siam Paragon","q":"Siam Paragon","note":""},
       {"time":"13:30–15:00","title":"暹羅海洋世界 Sea Life","q":"SEA LIFE Bangkok Ocean World","note":""},
       {"time":"15:00–16:00","title":"朱拉隆功大學 校園巡禮","q":"Chulalongkorn University","note":"學生市集、書店"},
       {"time":"16:00–17:30","title":"朱拉隆功商圈（米其林餐廳）","q":"Samyan Mitrtown food Michelin Bangkok","note":"可選 Samyan, CU 周邊"},
       {"time":"17:30–19:30","title":"Big C / 暹羅廣場逛街","q":"Big C Ratchadamri or Siam Square","note":""},
       {"time":"19:30→","title":"返回 Samala（Massage@Le）","q":"Massage@Le Bangkok","note":"可考：Nana Plaza（成人景點）"}
     ]},
    {"id":2,"label":"Day 2｜9/27 (六) ","chips":["市集日","JJ Mall","夜市美食"],
     "stops":[
       {"time":"08:30–09:30","title":"洽圖洽市集 Chatuchak","q":"Chatuchak Weekend Market","note":""},
       {"time":"09:30–11:30","title":"JJ Mall 閒逛","q":"JJ Mall Bangkok","note":""},
       {"time":"11:30–12:30","title":"午餐（自由安排）","q":"Chatuchak food court","note":""},
       {"time":"17:30–19:30","title":"喬德夜市 Jodd Fairs（火山排骨）","q":"Jodd Fairs Rama 9 Bangkok","note":"人氣夜市"}
     ]},
    {"id":3,"label":"Day 3｜9/28 (日) ","chips":["河上交通","寺廟群","考山路"],
     "stops":[
       {"time":"07:00–08:30","title":"萬豪附近早市","q":"Morning Market near Bangkok Marriott","note":"依住宿點就近早市"},
       {"time":"08:30–09:00","title":"Sathorn Pier 中央碼頭","q":"Sathorn Pier (Central Pier)","note":"搭船出發"},
       {"time":"09:00–09:30","title":"Rajinee 碼頭","q":"Rajinee Pier Bangkok","note":"步行前往寺廟群"},
       {"time":"09:30–12:00","title":"大皇宮 / 玉佛寺 / 臥佛寺","q":"Grand Palace Bangkok","note":"同區域步行可達"},
       {"time":"12:00–13:30","title":"瑪哈泰文青市集 用餐","q":"Tha Maharaj","note":""},
       {"time":"13:30–14:30","title":"王朗市場 → 鄭王廟","q":"Wang Lang Market","note":"可搭船過河到 Wat Arun"},
       {"time":"14:30–15:30","title":"鄭王廟 Wat Arun","q":"Wat Arun Ratchawararam","note":""},
       {"time":"15:30–17:00","title":"前往考山路 & 特色點","q":"Khaosan Road","note":"可看藍星巴克/堡壘等"},
       {"time":"19:00→","title":"返回 Samala（按摩）","q":"Samala Hotel Bangkok","note":""}
     ]},
    {"id":4,"label":"Day 4｜9/29 (一) ","chips":["在地市場","河畔商場"],
     "stops":[
       {"time":"08:30–09:30","title":"空叻市場 Khlong Toei Market","q":"Khlong Toei Market","note":"需有心理準備！"},
       {"time":"09:45–10:30","title":"Suan Phlu Market","q":"Suan Phlu Market","note":""},
       {"time":"10:45–11:30","title":"Bang Rak Bazaar","q":"Bang Rak Bazaar","note":""},
       {"time":"下午","title":"ICONSIAM（首選） / Big C","q":"ICONSIAM","note":"可自由購物/用餐"}
     ]}
  ];
  const saved = localStorage.getItem('customDays');
  const days = saved ? JSON.parse(saved) : DEFAULT_DAYS;

  const FALLBACK_ORIGIN = 'Samala Hotel Bangkok';
  const panels = document.getElementById('panels');
  const toast = document.getElementById('toast');

  const state = {
    origin: localStorage.getItem('lastOrigin') || FALLBACK_ORIGIN,
    watching:false, watchId:null,
    map:null, routeLayer:null, markers:[], userMarker:null,
    externalUrl:null
  };

  function showToast(msg){toast.textContent=msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',2200);}
  function encodeQ(q){return encodeURIComponent(q);}
  function isSecureContext(){return location.protocol==='https:'||location.hostname==='localhost';}
  function getMode(){return document.getElementById('travelMode').value||'transit';}

  function placeRow(stop){
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeQ(stop.q)}`;
    return `
    <div class="card">
      <div class="row">
        <div class="time">${stop.time}</div>
        <div class="place">${stop.title}</div>
      </div>
      ${stop.note?`<div class="note">${stop.note}</div>`:''}
      <div class="actions">
        <a class="action" target="_blank" rel="noopener" href="${mapUrl}">🗺️ 地點地圖</a>
        <button class="action secondary" data-dest="${encodeQ(stop.q)}">➡️ 由此導航</button>
        <button class="action" data-dest-inline="${encodeQ(stop.q)}">🧭 內嵌導航</button>
      </div>
    </div>`;
  }

  function renderPanels(){
    panels.innerHTML='';
    days.forEach(d=>{
      const chips = d.chips.map(c=>`<span class="pill">${c}</span>`).join(' ');
      const rows = d.stops.map(placeRow).join('');
      const panel = document.createElement('section');
      panel.id = `panel-${d.id}`;
      panel.setAttribute('role','tabpanel');
      panel.setAttribute('aria-labelledby', `tab-${d.id}`);
      panel.hidden = d.id !== 1;
      panel.innerHTML = `
        <div class="card">
          <div class="row"><div style="font-size:18px;font-weight:800">${d.label}</div><div>${chips}</div></div>
          <div class="note">步行/開車 ⇒ 內嵌導航；大眾運輸 ⇒ 轉外部 Google 地圖。可用「🧩 管理行程」新增/刪除/匯入/匯出。</div>
        </div>
        <div class="grid">${rows}</div>
        <div class="route-card">
          <div style="font-weight:800;margin-bottom:8px">📍 一鍵串起今日路線</div>
          <div class="actions">
            <button class="action" data-day="${d.id}" data-mode="full">內嵌：依序造訪各站（步行/開車）</button>
            <button class="action secondary" data-day="${d.id}" data-mode="dest">僅導航至最終點</button>
          </div>
        </div>`;
      panels.appendChild(panel);
    })
  }

  // ----- Geolocation -----
  function startWatch(){
    if(!('geolocation' in navigator)){showToast('裝置不支援定位'); state.origin=FALLBACK_ORIGIN; saveOrigin(); return;}
    if(state.watching) return;
    try{
      state.watchId = navigator.geolocation.watchPosition(pos=>{
        state.origin = `${pos.coords.latitude},${pos.coords.longitude}`; saveOrigin();
        if(state.map){
          if(!state.userMarker) state.userMarker = L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(state.map);
          else state.userMarker.setLatLng([pos.coords.latitude,pos.coords.longitude]);
          if(followOn) state.map.setView([pos.coords.latitude,pos.coords.longitude], Math.max(state.map.getZoom(), 16));
        }
        tickLive([pos.coords.latitude,pos.coords.longitude]);
      }, err=>{
        console.warn(err);
        state.origin = FALLBACK_ORIGIN; saveOrigin();
      }, {enableHighAccuracy:true, timeout:12000, maximumAge:2000});
      state.watching = true;
    }catch(e){
      console.warn(e);
      state.origin = FALLBACK_ORIGIN; saveOrigin();
    }
  }
  function saveOrigin(){ localStorage.setItem('lastOrigin', state.origin); }

  // ----- 外開 Google Maps -----
  function buildDirURL(origin, destination, waypoints, mode){
    const base='https://www.google.com/maps/dir/?api=1';
    const o=`origin=${encodeURIComponent(origin)}`;
    const d=`destination=${encodeURIComponent(destination)}`;
    const m=`travelmode=${mode}`;
    const w = waypoints && waypoints.length ? `&waypoints=${waypoints.map(wp=>encodeURIComponent(wp)).join('|')}` : '';
    return `${base}&${o}&${d}${w}&${m}`;
  }
  function openExternal(url){const win=window.open(url,'_blank'); if(!win) location.href=url;}

  // ----- 內嵌導航（Leaflet + OSRM） -----
  const overlay = document.getElementById('overlay');
  const btnClose = document.getElementById('btnClose');
  const btnOpenExternal = document.getElementById('btnOpenExternal');

  function openSheet(){overlay.style.display='block'; if(!state.map) initMap();}
  function closeSheet(){overlay.style.display='none';}
  btnClose.addEventListener('click', closeSheet);
  btnOpenExternal.addEventListener('click', ()=>{ if(state.externalUrl) openExternal(state.externalUrl); });

  function initMap(){
    state.map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(state.map);
    state.map.setView([13.7563, 100.5018], 12);
  }

  async function geocode(q){
    const llMatch = q && q.match?.(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
    if(llMatch) return [parseFloat(llMatch[1]), parseFloat(llMatch[2])];
    const cacheKey = 'gc_'+q;
    const cached = localStorage.getItem(cacheKey);
    if(cached){ try { const arr = JSON.parse(cached); if(Array.isArray(arr)&&arr.length===2) return arr; } catch(e){} }
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 8000);
    try{
      const url1 = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&lang=zh-TW`;
      const r1 = await fetch(url1, {signal: controller.signal});
      if(r1.ok){
        const j1 = await r1.json();
        if(j1.features && j1.features[0]){
          const [lng, lat] = j1.features[0].geometry.coordinates;
          clearTimeout(timeout);
          localStorage.setItem(cacheKey, JSON.stringify([lat,lng]));
          return [lat,lng];
        }
      }
    }catch(e){}
    try{
      const url2 = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`;
      const r2 = await fetch(url2, {headers:{'Accept':'application/json'}, referrerPolicy:'no-referrer', signal: controller.signal});
      if(r2.ok){
        const j2 = await r2.json();
        if(j2 && j2[0]){
          clearTimeout(timeout);
          const lat = parseFloat(j2[0].lat), lon = parseFloat(j2[0].lon);
          localStorage.setItem(cacheKey, JSON.stringify([lat,lon]));
          return [lat,lon];
        }
      }
    }catch(e){}
    clearTimeout(timeout);
    throw new Error('GEOCODE_FAIL');
  }

  async function osrmRoute(coords, profile){
    const points = coords.map(([lat,lng])=>`${lng},${lat}`).join(';');
    const url = `https://router.project-osrm.org/route/v1/${profile}/${points}?overview=full&geometries=geojson&steps=true`;
    const r = await fetch(url);
    const j = await r.json();
    if(j.code!=='Ok') throw new Error('OSRM error');
    return j.routes[0];
  }

  function clearRoute(){
    if(state.routeLayer){state.map.removeLayer(state.routeLayer); state.routeLayer=null;}
    state.markers.forEach(m=>state.map.removeLayer(m)); state.markers=[];
  }

  async function inlineNavigate(originQ, destQ, waypointsQ, mode){
    const profile = mode==='walking' ? 'foot' : 'driving';
    try{
      openSheet();
      clearRoute();
      let originLL;
      try{ originLL = await geocode(originQ); }
      catch(e){ showToast('無法解析目前位置，改用飯店起點'); originLL = await geocode(FALLBACK_ORIGIN); }
      const wpLLs = [];
      for(const w of (waypointsQ||[])){
        try{ wpLLs.push(await geocode(w)); } catch(e){ showToast('部分站點解析失敗，略過'); }
      }
      let destLL;
      try{ destLL = await geocode(destQ); }
      catch(e){ showToast('目的地解析失敗，改外開 Google 地圖'); openExternal(buildDirURL(originQ,destQ,waypointsQ,mode)); return; }
      const all = [originLL, ...wpLLs, destLL];
      if(all.length < 2){ showToast('座標不足，改外開 Google 地圖'); openExternal(buildDirURL(originQ,destQ,waypointsQ,mode)); return; }
      const route = await osrmRoute(all, profile);
      const line = L.geoJSON(route.geometry).addTo(state.map);
      state.routeLayer = line;
      const startM = L.marker(originLL).addTo(state.map);
      const endM = L.marker(destLL).addTo(state.map);
      state.markers.push(startM, endM);
      wpLLs.forEach(ll=>state.markers.push(L.circleMarker(ll,{radius:6}).addTo(state.map)));
      state.map.fitBounds(line.getBounds(), {padding:[30,30]});
      state.externalUrl = buildDirURL(originQ, destQ, waypointsQ, mode==='walking'?'walking':'driving');

      // live
      setCurrentRoute(route, destLL);
      currentDestQ = destQ; currentWpsQ = waypointsQ||[]; currentMode = mode;
      lastRerouteTs = Date.now();
      navStatus.textContent='路線已建立，您可以開始移動。';
    }catch(e){
      console.warn(e);
      showToast('內嵌路線服務繁忙或被限制，已改用 Google 地圖');
      openExternal(buildDirURL(originQ, destQ, waypointsQ, mode));
    }
  }

  // ----- Live helpers -----
  function toRad(x){return x*Math.PI/180;}
  function haversine(a,b){
    const R=6371000;
    const dLat=toRad(b[0]-a[0]), dLon=toRad(b[1]-a[1]);
    const lat1=toRad(a[0]), lat2=toRad(b[0]);
    const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(h));
  }
  function nearestDistanceToLine(point, lineCoords){
    let min=Infinity;
    for(const p of lineCoords){ const d=haversine(point,p); if(d<min) min=d; }
    return min;
  }
  let wakeLockObj=null;
  async function requestWake(){ try{ wakeLockObj = await navigator.wakeLock.request('screen'); showToast('已啟用常亮'); }catch(e){ showToast('常亮啟用失敗'); } }
  function releaseWake(){ try{ wakeLockObj && wakeLockObj.release(); wakeLockObj=null; showToast('已關閉常亮'); }catch(e){} }
  let voiceOn=false;
  function speak(text){ if(!voiceOn) return; try{ const u=new SpeechSynthesisUtterance(text); u.lang='zh-TW'; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }

  const navStatus = document.getElementById('navStatus');
  const btnFollow = document.getElementById('btnFollow');
  const btnWake = document.getElementById('btnWake');
  const btnVoice = document.getElementById('btnVoice');

  let followOn=false;
  let lastRerouteTs=0;
  const REROUTE_INTERVAL_MS=15000;
  const OFFROUTE_THRESHOLD_M=80;
  let currentDestQ=null, currentWpsQ=[], currentMode=null;
  let currentRouteCoords=[];
  let finalDestLL=null;

  btnFollow.addEventListener('click', ()=>{
    followOn=!followOn;
    btnFollow.textContent = followOn ? '🛑 停止即時導航' : '🔔 開始即時導航';
    if(followOn){ speak('開始即時導航'); navStatus.textContent='即時導航啟動中…'; }
    else{ navStatus.textContent='已停止即時導航'; }
  });
  btnWake.addEventListener('click', ()=>{ if(!wakeLockObj) requestWake(); else releaseWake(); });
  btnVoice.addEventListener('click', ()=>{ voiceOn=!voiceOn; btnVoice.textContent = voiceOn ? '🔊 語音開' : '🔈 語音'; showToast(voiceOn?'已開啟語音提示':'已關閉語音提示'); });

  function setCurrentRoute(route, destLL){
    currentRouteCoords = route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    finalDestLL = destLL;
  }
  function tickLive(userLL){
    if(!followOn || !currentRouteCoords.length){ if(followOn && state.externalUrl) navStatus.textContent='已啟動，等待路線…'; return; }
    const distToDest = haversine(userLL, finalDestLL);
    const dToRoute = nearestDistanceToLine(userLL, currentRouteCoords);
    const now = Date.now();
    if(dToRoute > OFFROUTE_THRESHOLD_M || (now - lastRerouteTs) > REROUTE_INTERVAL_MS){
      lastRerouteTs = now;
      const originQ = `${userLL[0]},${userLL[1]}`;
      inlineNavigate(originQ, currentDestQ, currentWpsQ, currentMode);
      speak('重新規劃路線');
    }
    navStatus.textContent = `距離終點約 ${(distToDest/1000).toFixed(2)} km｜偏離路線 ${Math.round(dToRoute)} m`;
  }

  // ----- Live map preview & clicks -----
  const liveMap = document.getElementById('liveMap');
  const mapFrame = document.getElementById('mapFrame');
  document.getElementById('btnLocate').addEventListener('click', ()=>{
    const src = `https://www.google.com/maps?q=${encodeURIComponent(state.origin)}&z=15&hl=zh-TW&output=embed`;
    mapFrame.src = src; liveMap.hidden = false;
  });

  document.addEventListener('click', (e)=>{
    if(e.target.matches('.tab')){ const id = Number(e.target.id.split('-')[1]); showTab(id); window.scrollTo({top:0,behavior:'smooth'}); }
    if(e.target.matches('.nav-btn')){ showTab(Number(e.target.dataset.go)); window.scrollTo({top:0,behavior:'smooth'}); }
    if(e.target.matches('.action.secondary') && e.target.dataset.dest){
      const dest = decodeURIComponent(e.target.dataset.dest);
      const mode = getMode();
      if(mode==='transit'){ openExternal(buildDirURL(state.origin, dest, [], mode)); }
      else { inlineNavigate(state.origin, dest, [], mode); }
    }
    if(e.target.matches('.action') && e.target.dataset.day){
      const id = Number(e.target.dataset.day);
      const mode = e.target.dataset.mode;
      const d = days.find(x=>x.id===id); if(!d) return;
      const dest = d.stops[d.stops.length-1]?.q || '';
      const waypoints = (mode==='dest') ? [] : d.stops.slice(0,-1).map(s=>s.q);
      const travel = getMode();
      if(travel==='transit'){ openExternal(buildDirURL(state.origin, dest, waypoints, travel)); }
      else { inlineNavigate(state.origin, dest, waypoints, travel); }
    }
    if(e.target.matches('[data-dest-inline]')){
      const dest = decodeURIComponent(e.target.dataset.destInline);
      const travel = getMode();
      if(travel==='transit') openExternal(buildDirURL(state.origin, dest, [], travel));
      else inlineNavigate(state.origin, dest, [], travel);
    }
  });

  function showTab(id){
    document.querySelectorAll('[role="tabpanel"]').forEach(p=>p.hidden=true);
    document.getElementById(`panel-${id}`).hidden=false;
    document.querySelectorAll('.tab').forEach(t=>t.setAttribute('aria-selected','false'));
    document.getElementById(`tab-${id}`).setAttribute('aria-selected','true');
    document.querySelectorAll('.nav-btn').forEach(n=>n.removeAttribute('aria-current'));
    document.querySelector(`.nav-btn[data-go="${id}"]`).setAttribute('aria-current','page');
  }

  document.getElementById('btnTodayRoute').addEventListener('click', ()=>{
    const current = document.querySelector('[role="tabpanel"]:not([hidden])');
    if(!current) return;
    const id = Number(current.id.split('-')[1]);
    const d = days.find(x=>x.id===id); if(!d) return;
    const dest = d.stops[d.stops.length-1]?.q || '';
    const waypoints = d.stops.slice(0,-1).map(s=>s.q);
    const travel = getMode();
    if(travel==='transit'){ openExternal(buildDirURL(state.origin, dest, waypoints, travel)); }
    else { inlineNavigate(state.origin, dest, waypoints, travel); }
  });

  // ----- 管理行程（可視化：新增/刪除/匯出/匯入） -----
  const mgrOverlay = document.getElementById('mgrOverlay');
  const mgrBody = document.getElementById('mgrBody');
  const btnManage = document.getElementById('btnManage');
  const btnCloseMgr = document.getElementById('btnCloseMgr');
  const btnAddStop = document.getElementById('btnAddStop');
  const btnExport = document.getElementById('btnExport');
  const btnImport = document.getElementById('btnImport');

  function openManager(){ renderManager(); mgrOverlay.style.display='block'; }
  function closeManager(){ mgrOverlay.style.display='none'; }
  btnManage.addEventListener('click', openManager);
  btnCloseMgr.addEventListener('click', closeManager);

  function renderManager(){
    let html = '';
    days.forEach(d=>{
      html += `
        <div class="card">
          <div class="row"><div style="font-weight:800">${d.label}</div>
            <div>${d.chips.map(c=>`<span class="pill">${c}</span>`).join(' ')}</div>
          </div>
          <ul style="list-style:none;padding:0;margin:8px 0">
            ${d.stops.map((s,idx)=>`
              <li class="row" style="align-items:flex-start;gap:8px;margin:6px 0">
                <div class="time" style="min-width:96px">${s.time||''}</div>
                <div style="flex:1">
                  <div class="place">${s.title}</div>
                  <div class="note">${s.q}${s.note?`｜${s.note}`:''}</div>
                </div>
                <button class="btn ghost" data-del="${d.id}:${idx}">刪除</button>
              </li>
            `).join('')}
          </ul>
        </div>`;
    });
    mgrBody.innerHTML = html;
  }

  document.addEventListener('click', (e)=>{
    if(e.target.matches('[data-del]')){
      const [dayIdStr, idxStr] = e.target.dataset.del.split(':');
      const d = days.find(x=>x.id === Number(dayIdStr));
      if(!d) return;
      if(!confirm('確定刪除此站點？')) return;
      d.stops.splice(Number(idxStr),1);
      localStorage.setItem('customDays', JSON.stringify(days));
      renderPanels();
      renderManager();
      showToast('已刪除站點');
    }
  });

  btnAddStop.addEventListener('click', ()=>{
    const dayId = Number(prompt('要新增到第幾天？(1-4)'));
    if(!dayId) return;
    const time = prompt('時間（如 14:00–16:00 或 下午）') || '';
    const title = prompt('標題（顯示用）') || '未命名';
    const q = prompt('導航關鍵字或經緯度（如 "Siam Paragon" 或 "13.7467,100.5349"）') || '';
    const note = prompt('備註（可空白）') || '';
    const d = days.find(x=>x.id===dayId); if(!d) return alert('找不到指定天數');
    d.stops.push({time,title,q,note});
    localStorage.setItem('customDays', JSON.stringify(days));
    renderPanels();
    renderManager();
    showToast('已新增站點');
  });

  btnExport.addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(days,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='itinerary.json'; a.click(); URL.revokeObjectURL(url);
  });

  btnImport.addEventListener('click', ()=>{
    const str = prompt('貼上 days 陣列 JSON'); if(!str) return;
    try{
      const incoming = JSON.parse(str);
      if(Array.isArray(incoming)){ localStorage.setItem('customDays', JSON.stringify(incoming)); location.reload(); }
      else alert('格式錯誤：需為陣列');
    }catch(e){ alert('JSON 解析失敗'); }
  });

  // ----- 啟動 -----
  renderPanels();
  if(isSecureContext()) startWatch(); else showToast('非 HTTPS/localhost：定位可能不準，建議用 HTTPS 網址');

  </script>
</body>
</html>
